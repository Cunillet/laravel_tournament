services:
  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dd_tournaments_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini:ro
    networks:
      - dd_tournaments_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # Nginx Web Server
  nginx:
    image: nginx:1.27-alpine
    container_name: dd_tournaments_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dd_tournaments_network
    depends_on:
      - php

  # MySQL 8 Database
  mysql:
    image: mysql:8.4
    container_name: dd_tournaments_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dd_tournaments}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-dd_user}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dd_tournaments_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (optional - for sessions & cache)
  redis:
    image: redis:7.4-alpine
    container_name: dd_tournaments_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dd_tournaments_network
    command: redis-server --appendonly yes

  # Composer (one-shot to create/update Laravel)
  composer:
    image: composer:2.7
    container_name: dd_tournaments_composer
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    profiles:
      - donotstart
    networks:
      - dd_tournaments_network

  # Laravel Artisan (for running commands)
  artisan:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dd_tournaments_artisan
    working_dir: /var/www
    entrypoint: ["php", "artisan"]
    volumes:
      - ./src:/var/www
    profiles:
      - donotstart
    networks:
      - dd_tournaments_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  dd_tournaments_network:
    driver: bridge
